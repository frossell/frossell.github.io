<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Calculadora</title>
<script src="js/scripts.js" type="text/javascript"></script>
<link rel="stylesheet" href="css/javascript.css">
</head>
<body> 
   <form class="caixa" name="calc"> 
      <input class="operant1" type="Text" name="operant1" value="0" size="12"> 
      <br> 
      <input class="operant2" type="Text" name="operant2" value="0" size="12"> 
      <br> 
      <input type="Button" name="" value=" + " onclick="suma()"> 
      <input type="Button" name="" value=" - " onclick="resta()"> 
      <input type="Button" name="" value=" * " onclick="multiplicacio()"> 
      <input type="Button" name="" value=" / " onclick="divisio()"> 
      <br> 
      <input class="resultat" type="Text" name="resultat" value="0" size="12"> 
    </form> 
</html>
