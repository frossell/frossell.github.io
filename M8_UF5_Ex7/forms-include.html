<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" type="text/css" href="css/styles.css" />
	<script src="js/validacio-include.js"></script>
	<title>what?</title>
</head>
<body>
	<h1>Hardware Shop S.L</h1>
	<!--<form action="javascript:validarForm(this)" method="post" name="formulari" id="formulari" >-->
	<form method="post" name="formulari" id="formulari" onsubmit="return validarForm()">
		<label>1.Identificació</label>		
		<fieldset>
			<legend>Dades del client</legend>
			<label for="nomComplet">Nom i Cognoms:</label><br>
			<input type="text" name="nomComplet" id="nomComplet" required="required"><br>
			<label for="numerosNIF">NIF:</label><br>
			<input type="number" name="numerosNIF" id="numerosNIF" max="99999999" value="12345678" required="required">-<input type="text" name="lletraNIF" id="lletraNIF" maxlength="1" value="Z" required><br>
			<label for="correu">Correu Electrònic:</label><br>
			<input type="email" name="correu" id="correu" placeholder="usuari@domini.com" required><br>
			<label for="contrasenya">Contrasenya:</label><br>
			<input type="password" name="contrasenya" id="contrasenya" required><br>
		</fieldset>
		<fieldset>
			<legend>Tipus de client:</legend>
			<input type="radio" name="client" value="particular" checked id="particular">Particular<br>
			<input type="radio" name="client" value="empresa" id="empresa">Empresa<br>
		</fieldset> 
		<label>2.Components</label>
		<fieldset>
			<legend>Dades dels components</legend>
			<label for="processador">Processdor:</label><br>
			<select id="processador" size="2" required>
				<option value="Intel" id="intel">Intel</option>
				<option value="AMD" id="AMD">AMD</option>			
			</select><br><br>
			<label for="placaMare">Placa mare:</label><br>
			<select id="placaMare" required>
				<option value="" selected="selected">- Selecciona -</option>
			   <option value="asus">Asus</option>
			   <option value="gigabyte">Gigabyte</option>
			   <option value="otra">Otra</option>
			</select><br><br>
			<input type="checkbox" name="condicions" id="condicions" required><label for="condicions">Accepto les condicions de venda</label>
		</fieldset>
		<fieldset>
			<input type="submit" id="submit" value="Enviar formulari"><input type="reset" id="reset" value="Esborrar formulari">		
		</fieldset>
	</form>
</body>
</html>
